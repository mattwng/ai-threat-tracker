<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Threat Tracker</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #0f1525;
      --surface2: #141c30;
      --border: #1e2d4a;
      --accent: #00d4ff;
      --accent-dim: #0097b5;
      --text: #c8d8f0;
      --text-dim: #6b7fa3;
      --text-bright: #e8f0ff;
      --crit: #ff3b5c;
      --high: #ff7a2e;
      --med: #f0c040;
      --low: #40d080;
      --tag-bg: #1a2540;
      --tag-text: #88aad0;
      --mono: 'Courier New', 'Consolas', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      background: linear-gradient(180deg, #060912 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .header-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,212,255,0.4);
    }

    .freshness-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--low);
      box-shadow: 0 0 8px var(--low);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .freshness-dot.stale { background: var(--med); box-shadow: 0 0 8px var(--med); }
    .freshness-dot.generating { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: fast-pulse 0.8s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fast-pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .last-updated {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Status bar ────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-family: var(--mono);
      cursor: default;
      border: 1px solid transparent;
    }

    .source-pill.live-ok { background: rgba(64,208,128,0.12); border-color: rgba(64,208,128,0.3); color: var(--low); }
    .source-pill.live-err { background: rgba(240,192,64,0.12); border-color: rgba(240,192,64,0.3); color: var(--med); }
    .source-pill.static { background: rgba(107,127,163,0.12); border-color: rgba(107,127,163,0.3); color: var(--text-dim); }

    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .refresh-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .refresh-btn:hover { background: rgba(0,212,255,0.1); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    .refresh-btn:disabled { opacity: 0.4; cursor: wait; }

    /* ── Tag filter bar ────────────────────────── */
    .filter-bar {
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .filter-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-tag {
      padding: 2px 10px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.1s;
    }

    .filter-tag:hover, .filter-tag.active {
      background: rgba(0,212,255,0.15);
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .filter-clear {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--mono);
      margin-left: 4px;
    }
    .filter-clear:hover { color: var(--text); }

    /* ── Main content ──────────────────────────── */
    .container { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

    /* ── Source sections ───────────────────────── */
    .source-section { margin-bottom: 28px; }

    .source-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .source-header:hover { background: var(--surface2); }

    .source-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 1px;
    }

    .source-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .source-type-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .source-type-badge.live { background: rgba(64,208,128,0.15); color: var(--low); }
    .source-type-badge.static { background: rgba(107,127,163,0.15); color: var(--text-dim); }
    .source-type-badge.degraded { background: rgba(240,192,64,0.15); color: var(--med); }

    .source-chevron {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .source-section.collapsed .source-chevron { transform: rotate(-90deg); }

    .source-body {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }

    .source-section.collapsed .source-body { display: none; }

    /* ── Threat cards ──────────────────────────── */
    .threat-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .threat-card:last-child { border-bottom: none; }
    .threat-card:hover { background: rgba(255,255,255,0.015); }
    .threat-card.hidden { display: none; }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .severity-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .sev-critical { background: rgba(255,59,92,0.2); color: var(--crit); border: 1px solid rgba(255,59,92,0.3); }
    .sev-high { background: rgba(255,122,46,0.2); color: var(--high); border: 1px solid rgba(255,122,46,0.3); }
    .sev-medium { background: rgba(240,192,64,0.2); color: var(--med); border: 1px solid rgba(240,192,64,0.3); }
    .sev-low { background: rgba(64,208,128,0.2); color: var(--low); border: 1px solid rgba(64,208,128,0.3); }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      line-height: 1.4;
    }

    .card-description {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .card-affected {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.2);
      border-left: 2px solid var(--accent-dim);
      border-radius: 0 3px 3px 0;
    }

    .card-affected-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 2px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }

    .card-tag {
      padding: 1px 7px;
      border-radius: 9px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 10px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.1s;
    }

    .card-tag:hover { background: rgba(0,212,255,0.15); color: var(--accent); }

    .card-link {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent-dim);
      text-decoration: none;
      padding: 2px 8px;
      border: 1px solid rgba(0,150,180,0.3);
      border-radius: 3px;
      transition: all 0.1s;
    }

    .card-link:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,212,255,0.05); }

    /* ── Loading / empty states ─────────────────── */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      font-family: var(--mono);
      color: var(--text-dim);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .error-banner {
      background: rgba(255,59,92,0.1);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--crit);
      font-family: var(--mono);
      margin-bottom: 16px;
    }

    .generating-notice {
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--accent);
      font-family: var(--mono);
      margin-bottom: 16px;
      display: none;
    }

    .generating-notice.visible { display: block; }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 14px 14px 12px; }
      .container { padding: 14px; }
      .header-title { font-size: 16px; }
      .filter-bar { padding: 8px 14px; }
      .status-bar { gap: 6px; }
      .last-updated { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <span class="freshness-dot" id="freshnessDot"></span>
    <span class="header-title">AI THREAT TRACKER</span>
    <span class="last-updated" id="lastUpdated">—</span>
  </div>
  <div class="status-bar" id="statusBar">
    <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">Loading sources...</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">⟳ REFRESH</button>
  </div>
</div>

<!-- ── Severity Filter Bar ────────────────────────────────────────────────── -->
<div class="filter-bar" id="filterBar" style="display:none">
  <span class="filter-label">Severity:</span>
  <div id="severityPills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  <span class="filter-clear" id="filterClear" onclick="clearFilter()" style="display:none">✕ all</span>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div class="container">
  <div class="generating-notice" id="generatingNotice">
    ⟳ Fetching live threat data… This takes ~30–60 seconds. Checking every 10s.
  </div>

  <div id="mainContent">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-title">INITIALIZING THREAT FEED</div>
      <div style="font-size:12px">Connecting to intelligence sources...</div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let _data = null;
let _activeTag = null;
let _pollTimer = null;
const STORAGE_KEY = 'att_collapsed';

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => loadThreats());

async function loadThreats() {
  try {
    const r = await fetch('/api/threats');
    const json = await r.json();
    _data = json;

    if (json.generating) {
      showGenerating(true);
      startPolling();
    } else {
      showGenerating(false);
    }

    render(json);
  } catch (e) {
    showError('Failed to load threat data: ' + e.message);
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
function startPolling() {
  if (_pollTimer) return;
  _pollTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();
      if (!s.generating) {
        clearInterval(_pollTimer);
        _pollTimer = null;
        showGenerating(false);
        await loadThreats();
      }
    } catch (_) {}
  }, 10000);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  updateHeader(data);
  updateStatusBar(data.sources_status || {});
  renderSections(data.grouped || {});
  buildSeverityFilter(data.grouped || {});
}

function updateHeader(data) {
  const dot = document.getElementById('freshnessDot');
  const lu = document.getElementById('lastUpdated');

  if (data.generating) {
    dot.className = 'freshness-dot generating';
  } else if ((data.cache_age_seconds || 0) > 14400) {
    dot.className = 'freshness-dot stale';
  } else {
    dot.className = 'freshness-dot';
  }

  if (data.timestamp) {
    try {
      const dt = new Date(data.timestamp);
      lu.textContent = 'Updated ' + dt.toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    } catch (_) {}
  }
}

function updateStatusBar(sourcesStatus) {
  const bar = document.getElementById('statusBar');
  const btn = document.getElementById('refreshBtn');
  let html = '';

  const orderedKeys = [...SOURCE_ORDER.filter(k => k in sourcesStatus), ...Object.keys(sourcesStatus).filter(k => !SOURCE_ORDER.includes(k))];

  for (const [name, info] of orderedKeys.map(k => [k, sourcesStatus[k]])) {
    const type = info.type || 'live';
    let cls, dot, label;
    if (type === 'static') {
      cls = 'static'; label = 'static';
    } else if (info.ok) {
      cls = 'live-ok'; label = 'live';
    } else {
      cls = 'live-err'; label = 'degraded';
    }

    const count = info.count ? ` (${info.count})` : '';
    const title = info.error ? ` title="${escHtml(info.error)}"` : '';
    html += `<span class="source-pill ${cls}"${title}><span class="pill-dot"></span>${escHtml(name)}${count}</span>`;
  }

  bar.innerHTML = html;
  bar.appendChild(btn);
}

const SOURCE_ORDER = ['CISA KEV', 'MITRE ATLAS', 'AI Incident Database', 'FireTail AI Breaches',
  'ENISA Threat Landscape', 'IBM X-Force Index', 'Verizon DBIR', 'Google / Mandiant', 'MIT AI Incident Tracker'];

function renderSections(grouped) {
  const el = document.getElementById('mainContent');
  if (!grouped || Object.keys(grouped).length === 0) {
    el.innerHTML = '<div class="loading-state"><div class="loading-title">NO DATA YET</div><div style="font-size:12px">Fetch may still be running.</div></div>';
    return;
  }

  const collapsed = getCollapsedState();
  const keys = [...SOURCE_ORDER.filter(k => k in grouped), ...Object.keys(grouped).filter(k => !SOURCE_ORDER.includes(k))];

  el.innerHTML = keys.map(source => {
    const entries = grouped[source] || [];
    if (entries.length === 0) return '';

    const isCollapsed = collapsed.has(source);
    const isStatic = isStaticSource(source);
    const typeLabel = isStatic ? 'static' : 'live';

    return `
    <div class="source-section${isCollapsed ? ' collapsed' : ''}" id="sec-${slugify(source)}">
      <div class="source-header" onclick="toggleSection('${slugify(source)}','${escAttr(source)}')">
        <span class="source-name">${escHtml(source)}</span>
        <span class="source-count">${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</span>
        <span class="source-type-badge ${typeLabel}">${typeLabel}</span>
        <span class="source-chevron">▼</span>
      </div>
      <div class="source-body">
        ${entries.map(e => renderCard(e)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCard(entry) {
  const sev = entry.severity || 'medium';
  const tags = (entry.tags || []).slice(0, 6);
  let pubDate = '—';
  try {
    const d = new Date(entry.published);
    pubDate = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (_) {}

  const tagAttrs = tags.map(t => escAttr(t)).join(',');

  return `
  <div class="threat-card" data-tags="${tagAttrs}" data-severity="${sev}" data-id="${escAttr(entry.id)}">
    <div class="card-header">
      <span class="severity-badge sev-${sev}">${sev}</span>
      <span class="card-title">${escHtml(entry.title)}</span>
    </div>
    <div class="card-description">${escHtml(truncate(entry.description, 280))}</div>
    ${entry.vulnerability_summary ? `
    <div class="card-affected">
      <span class="card-affected-label">Who is affected</span>
      ${escHtml(entry.vulnerability_summary)}
    </div>` : ''}
    <div class="card-footer">
      <span class="card-date">${escHtml(pubDate)}</span>
      <div class="card-tags">
        ${tags.map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('')}
      </div>
      ${entry.link ? `<a class="card-link" href="${escAttr(entry.link)}" target="_blank" rel="noopener">Details →</a>` : ''}
    </div>
  </div>`;
}

// ── Severity filter ───────────────────────────────────────────────────────────
const SEV_ORDER = ['critical', 'high', 'medium', 'low'];
const SEV_COLORS = { critical: 'var(--crit)', high: 'var(--high)', medium: 'var(--med)', low: 'var(--low)' };

function buildSeverityFilter(grouped) {
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  for (const entries of Object.values(grouped)) {
    for (const e of entries) {
      const s = (e.severity || 'medium').toLowerCase();
      if (s in counts) counts[s]++;
    }
  }
  const fb = document.getElementById('filterBar');
  const sp = document.getElementById('severityPills');
  const hasCounts = Object.values(counts).some(c => c > 0);
  if (!hasCounts) { fb.style.display = 'none'; return; }
  fb.style.display = 'flex';
  sp.innerHTML = SEV_ORDER.filter(s => counts[s] > 0).map(s =>
    `<span class="filter-tag" id="sev-pill-${s}" onclick="filterBySeverity('${s}')"
      style="border-color:${SEV_COLORS[s]}33;color:${SEV_COLORS[s]}">
      ${s} <span style="opacity:0.6">(${counts[s]})</span>
    </span>`
  ).join('');
}

function filterBySeverity(sev) {
  if (_activeTag === sev) { clearFilter(); return; }
  _activeTag = sev;
  document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('active'));
  const pill = document.getElementById(`sev-pill-${sev}`);
  if (pill) pill.classList.add('active');
  document.getElementById('filterClear').style.display = 'inline';
  document.querySelectorAll('.threat-card').forEach(card => {
    card.classList.toggle('hidden', card.dataset.severity !== sev);
  });
}

function clearFilter() {
  _activeTag = null;
  document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('active'));
  document.getElementById('filterClear').style.display = 'none';
  document.querySelectorAll('.threat-card').forEach(card => card.classList.remove('hidden'));
}

// ── Collapsible ───────────────────────────────────────────────────────────────
function toggleSection(slug, source) {
  const el = document.getElementById(`sec-${slug}`);
  if (!el) return;
  const isCollapsed = el.classList.toggle('collapsed');
  const state = getCollapsedState();
  if (isCollapsed) state.add(source); else state.delete(source);
  saveCollapsedState(state);
}

function getCollapsedState() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored !== null) {
    try { return new Set(JSON.parse(stored)); } catch(_) { return new Set(); }
  }
  // First visit: default static sources to collapsed, live sources open
  return new Set(['ENISA Threat Landscape', 'IBM X-Force Index', 'Verizon DBIR', 'Google / Mandiant', 'MIT AI Incident Tracker']);
}

function saveCollapsedState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...s])); } catch(_) {}
}

// ── Refresh ───────────────────────────────────────────────────────────────────
async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⟳ REFRESHING…';
  try {
    await fetch('/api/refresh', { method: 'POST' });
    showGenerating(true);
    startPolling();
  } catch (e) {
    showError('Refresh failed: ' + e.message);
  } finally {
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '⟳ REFRESH';
    }, 3000);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showGenerating(on) {
  document.getElementById('generatingNotice').classList.toggle('visible', on);
}

function showError(msg) {
  const el = document.getElementById('mainContent');
  el.innerHTML = `<div class="error-banner">ERROR: ${escHtml(msg)}</div>` + (el.innerHTML || '');
}

function isStaticSource(name) {
  return ['ENISA Threat Landscape','IBM X-Force Index','Verizon DBIR','Google / Mandiant','MIT AI Incident Tracker'].includes(name);
}

function slugify(s) { return s.replace(/[^a-z0-9]/gi, '-').toLowerCase(); }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
